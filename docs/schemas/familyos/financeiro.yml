schema_version: "0.1"
module: financeiro
system: familyos
updated_at: "2026-06-12"

operations:

  - id: OP-FIN-01
    name: registrar_gasto
    description: Registra um gasto no envelope da categoria correspondente
    risk_level: validated
    autonomy_policy: execute_after_validation

    input_schema:
      descricao:
        type: string
        required: true
        min_length: 3
      valor:
        type: decimal
        required: true
        gt: 0
        human_confirmation_if:
          gt: 500
      categoria_id:
        type: int
        required: true
        foreign_key:
          table: categorias
          filter:
            ativo: true
      membro_id:
        type: int
        required: true
        infer_from_context: true
        foreign_key:
          table: membros
          filter:
            ativo: true
      data:
        type: date
        format: YYYY-MM-DD
        required: false
        default: today
      conta:
        type: enum
        values: [inter, c6, santander, cartao, dinheiro]
        required: false
        infer_from_context: true
      fonte:
        type: enum
        values: [manual, ocr, extrato, hermes]
        required: false
        default: hermes
      reembolso:
        type: bool
        required: false
        default: false
      reembolso_por:
        type: string
        required_if:
          field: reembolso
          value: true

    state_guards:
      - description: Mês atual não pode estar fechado
        query: "SELECT fechado FROM meses WHERE ano = year(today) AND mes = month(today)"
        assert:
          fechado: false
        on_fail:
          message: "O mês atual está fechado. Não é possível registrar novos gastos."
          suggest: consulta_mes

    side_effects:
      - id: check_budget_threshold
        description: Checar se envelope atingiu 80% ou 100% do orçamento
        query: "SELECT (SUM(g.valor) / c.orcamento) as pct FROM gastos g JOIN categorias c ON c.id = g.categoria_id WHERE g.categoria_id = :categoria_id AND month(g.data) = month(today)"
        alert_if:
          gte: 0.8
        message_template: "Envelope {{categoria}} em {{pct}}% do orçamento mensal."

    signpost:
      success:
        include: [gasto_id, categoria, envelope_percentual]
        alerts: [check_budget_threshold]
        next_actions:
          - atualizar_gasto
          - consulta_mes
      validation_error:
        message: "Não foi possível registrar o gasto."
        include_errors: true
        next_actions:
          - registrar_gasto

    audit:
      log: true
      include_fields: [membro_id, valor, categoria_id, fonte]

  - id: OP-FIN-02
    name: registrar_gasto_ocr
    description: Registra gasto a partir de foto de comprovante via OCR
    risk_level: validated
    autonomy_policy: execute_after_validation

    input_schema:
      imagem:
        type: base64
        required: true
      membro_id:
        type: int
        required: true
        infer_from_context: true

    validation_rules:
      - id: ocr_confidence
        description: Confiança do OCR deve ser >= 80% para execução autônoma
        check: ocr_confidence >= 0.8
        on_fail:
          policy: human_confirmation
          message: "Não consegui ler o comprovante com segurança. Pode confirmar: valor {{valor}}, local {{local}}, data {{data}}?"

    state_guards:
      - description: Mês atual não pode estar fechado
        query: "SELECT fechado FROM meses WHERE ano = year(today) AND mes = month(today)"
        assert:
          fechado: false

    side_effects:
      - id: check_budget_threshold
        description: Checar envelope após salvar
        query: "SELECT (SUM(g.valor) / c.orcamento) as pct FROM gastos g JOIN categorias c ON c.id = g.categoria_id WHERE g.categoria_id = :categoria_id AND month(g.data) = month(today)"
        alert_if:
          gte: 0.8
        message_template: "Envelope {{categoria}} em {{pct}}% do orçamento mensal."

    signpost:
      success:
        include: [gasto_id, valor_extraido, categoria_sugerida, confianca_ocr]
        next_actions:
          - atualizar_gasto
      low_confidence:
        message: "Comprovante lido com baixa confiança. Aguardando confirmação humana."
        include: [valor_extraido, local_extraido, data_extraida]

    audit:
      log: true
      include_fields: [membro_id, valor, ocr_texto, fonte]

  - id: OP-FIN-03
    name: registrar_entrada
    description: Registra uma receita (salário, freelance, pix, etc.)
    risk_level: validated
    autonomy_policy: execute_after_validation

    input_schema:
      descricao:
        type: string
        required: true
      valor:
        type: decimal
        required: true
        gt: 0
      membro_id:
        type: int
        required: true
        foreign_key:
          table: membros
          filter:
            ativo: true
      tipo:
        type: enum
        values: [salario, freelance, reembolso, pix, transferencia, outro]
        required: true
        infer_from_context: true
      conta:
        type: enum
        values: [inter, c6, santander, cartao, dinheiro]
        required: true
      data:
        type: date
        required: false
        default: today
      recorrente:
        type: bool
        required: false
        default: false

    signpost:
      success:
        include: [entrada_id, tipo, valor]
        next_actions:
          - consulta_mes
          - aporte_meta

    audit:
      log: true
      include_fields: [membro_id, valor, tipo]

  - id: OP-FIN-04
    name: consulta_mes
    description: Consulta resumo financeiro do mês com breakdown por categoria
    risk_level: free
    autonomy_policy: execute_immediately

    input_schema:
      ano:
        type: int
        required: false
        default: current_year
      mes:
        type: int
        required: false
        default: current_month
        min: 1
        max: 12
      membro_id:
        type: int
        required: false
        description: "Se null, retorna consolidado da família"

    signpost:
      success:
        include: [saldo, total_gastos, total_entradas, envelopes_alerta]
        next_actions:
          - consulta_categoria
          - projecao_mes

    audit:
      log: false

  - id: OP-FIN-05
    name: atualizar_gasto
    description: Corrige um campo de um gasto já registrado
    risk_level: contextual
    autonomy_policy: validate_state_then_execute

    input_schema:
      gasto_id:
        type: int
        required: true
        foreign_key:
          table: gastos
      campo:
        type: string
        required: true
        allowed_values: [descricao, valor, categoria_id, conta, data, reembolso, reembolso_por]
      novo_valor:
        type: any
        required: true

    state_guards:
      - description: Mês do gasto não pode estar fechado
        query: "SELECT m.fechado FROM meses m JOIN gastos g ON m.ano = year(g.data) AND m.mes = month(g.data) WHERE g.id = :gasto_id"
        assert:
          fechado: false
        on_fail:
          message: "Não é possível alterar gastos de um mês fechado."

    validation_rules:
      - id: show_before_after
        description: Apresentar estado anterior antes de confirmar
        policy: show_diff
        message_template: "Alterando {{campo}} de {{valor_anterior}} para {{novo_valor}}. Confirma?"

    side_effects:
      - id: check_budget_threshold
        description: Recalcular envelope se campo alterado for valor ou categoria_id
        trigger_if_field_changed: [valor, categoria_id]
        query: "SELECT (SUM(g.valor) / c.orcamento) as pct FROM gastos g JOIN categorias c ON c.id = g.categoria_id WHERE g.categoria_id = :categoria_id AND month(g.data) = month(today)"
        alert_if:
          gte: 0.8

    signpost:
      success:
        include: [estado_anterior, estado_atual]
        next_actions:
          - consulta_mes

    audit:
      log: true
      include_fields: [gasto_id, campo, valor_anterior, novo_valor, membro_id]

  - id: OP-FIN-06
    name: deletar_gasto
    description: Remove um gasto permanentemente
    risk_level: confirmation
    autonomy_policy: require_explicit_confirmation

    input_schema:
      gasto_id:
        type: int
        required: true
        foreign_key:
          table: gastos
      confirmacao:
        type: string
        required: true
        must_contain: "CONFIRMAR"

    state_guards:
      - description: Mês do gasto não pode estar fechado
        query: "SELECT m.fechado FROM meses m JOIN gastos g ON m.ano = year(g.data) AND m.mes = month(g.data) WHERE g.id = :gasto_id"
        assert:
          fechado: false
        on_fail:
          message: "Não é possível deletar gastos de um mês fechado."

    human_confirmation:
      required: true
      message_template: "Isso vai remover: R${{valor}} em {{categoria}} em {{data}}. Responda CONFIRMAR para prosseguir."
      pending_status: 202

    signpost:
      pending:
        message_template: "Aguardando confirmação para remover R${{valor}} em {{categoria}} em {{data}}."
      success:
        message: "Gasto removido."
        next_actions:
          - consulta_mes

    audit:
      log: true
      include_fields: [gasto_id, valor, categoria_id, membro_id, data_delecao]

  - id: OP-FIN-07
    name: fechar_mes
    description: Fecha o mês financeiro — bloqueia edições retroativas
    risk_level: confirmation
    autonomy_policy: require_explicit_confirmation

    input_schema:
      ano:
        type: int
        required: true
      mes:
        type: int
        required: true
        min: 1
        max: 12
      confirmacao:
        type: string
        required: true
        must_contain: "CONFIRMAR"

    state_guards:
      - description: Mês deve existir e estar aberto
        query: "SELECT fechado FROM meses WHERE ano = :ano AND mes = :mes"
        assert:
          fechado: false
        on_fail:
          message: "Mês não encontrado ou já está fechado."

    human_confirmation:
      required: true
      message_template: "Fechar {{mes}}/{{ano}}? Total gastos: R${{total_gastos}}, Entradas: R${{total_entradas}}, Saldo: R${{saldo}}. Após fechar não será possível editar. Responda CONFIRMAR."
      pending_status: 202

    signpost:
      success:
        include: [mes_fechado, total_gastos, total_entradas, saldo]
        next_actions:
          - consulta_mes

    audit:
      log: true
      include_fields: [ano, mes, fechado_por, fechado_em]

  - id: OP-FIN-08
    name: aporte_meta
    description: Registra contribuição em uma meta de poupança
    risk_level: validated
    autonomy_policy: execute_after_validation

    input_schema:
      meta_id:
        type: int
        required: true
        foreign_key:
          table: metas
          filter:
            status: ativa
      valor:
        type: decimal
        required: true
        gt: 0
      data:
        type: date
        required: false
        default: today
      descricao:
        type: string
        required: false

    validation_rules:
      - id: check_meta_overflow
        description: Avisar se aporte ultrapassa valor alvo
        query: "SELECT (valor_atual + :valor) > valor_alvo as overflow, valor_alvo, valor_atual FROM metas WHERE id = :meta_id"
        warn_if:
          overflow: true
        message_template: "Este aporte ultrapassa o valor alvo da meta em R${{excedente}}. Deseja continuar?"

    signpost:
      success:
        include: [meta_titulo, progresso_percentual, valor_faltante]
        next_actions:
          - consulta_metas

    audit:
      log: true
      include_fields: [meta_id, valor, membro_id]
